<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: rgba(255,255,255,0.07);
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.15);
      --text-primary: #f0ece4;
      --text-muted: rgba(240,236,228,0.45);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    .eyebrow {
      font-family: 'Outfit', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.3s;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 3rem;
      opacity: 0;
      animation: scaleIn 0.5s ease forwards 0.4s;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    .nav-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 1.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text-primary);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease, transform 0.25s ease;
    }

    .nav-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .nav-card:hover {
      border-color: rgba(201,169,110,0.4);
      transform: translateY(-2px);
    }

    .nav-card:hover::before {
      opacity: 1;
    }

    .nav-card:hover .arrow {
      transform: translateX(5px);
      color: var(--accent);
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      position: relative;
      z-index: 1;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 3px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 16px;
      height: 16px;
    }

    .card-text {
      text-align: left;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .card-desc {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .arrow {
      position: relative;
      z-index: 1;
      color: var(--text-muted);
      transition: transform 0.25s ease, color 0.25s ease;
      font-size: 1.1rem;
    }

    .footer-note {
      margin-top: 2.5rem;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.7s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <p class="eyebrow">Select a section</p>
    <h1>Where to?</h1>
    <p class="subtitle">Choose your destination below</p>
    <div class="divider"></div>

    <nav>
      <a href="driving.html" class="nav-card">
        <div class="card-left">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 8v4l3 3"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">Driving</div>
          </div>
        </div>
        <span class="arrow">→</span>
      </a>

      <a href="day1.html" class="nav-card">
        <div class="card-left">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">Day 1</div>
          </div>
        </div>
        <span class="arrow">→</span>
      </a>
    </nav>

    <p class="footer-note">Navigation menu</p>
  </div>
</body>
</html>
